<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR4 - Inès</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}

#btn,#restart{background:#fff;color:#000;border:none;padding:20px 40px;font-size:clamp(20px,5vmin,26px);border-radius:8px;position:fixed;left:50%;transform:translateX(-50%);cursor:pointer;z-index:100}
#btn{top:50%;transform:translate(-50%,-50%)}
#restart{bottom:40px;display:none}

#qcm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:100vw;max-width:100vw;height:auto;max-height:85vh;object-fit:contain;display:none}
.zone{position:fixed;cursor:pointer;border:3px solid transparent;display:none;transition:.2s;z-index:20}
.zone:hover{border-color:#fff;background:rgba(255,255,255,.15)}

#messageFin{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,4.5vmin,28px);text-align:center;display:none;z-index:10;padding:20px;max-width:650px;line-height:1.45}
</style>
<style>
html,body,button,input,select,textarea{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
p,#messageFin{font-size:clamp(20px,4.5vmin,28px)!important;line-height:1.45!important}
#btn,#restart{font-size:clamp(20px,5vmin,26px)!important}
</style>
</head>
<body>

<button id="btn">Touchez pour commencer</button>
<button id="restart">Recommencer</button>

<img id="qcm" src="./ines_5_choix.jpg" alt="Choisissez votre Inès">

<div id="messageFin"></div>

<div class="zone" id="z1"></div>
<div class="zone" id="z2"></div>
<div class="zone" id="z3"></div>
<div class="zone" id="z4"></div>
<div class="zone" id="z5"></div>
<div class="zone" id="z6"></div>

<audio id="intro" src="./ines_question.mp3" preload="auto"></audio>
<audio id="consigne" src="./ines_consigne.mp3" preload="auto"></audio>

<script>
function trackScan(id) {
  try {
    let usedSet = new Set(JSON.parse(localStorage.getItem('qr_used_set') || '[]'));
    usedSet.add(id);
    let arr = Array.from(usedSet);
    localStorage.setItem('qr_used_set', JSON.stringify(arr));
    localStorage.setItem('scans_used', arr.length);
    localStorage.setItem('scans_total', '12'); 
  } catch(e) { console.error('Storage error:', e); }
}

const btn=document.getElementById('btn');
const restart=document.getElementById('restart');
const qcm=document.getElementById('qcm');
const intro=document.getElementById('intro');
const consigne=document.getElementById('consigne');
const zones=document.querySelectorAll('.zone');
const messageFin=document.getElementById('messageFin');

function addUsed(id){
  const set=new Set(JSON.parse(localStorage.getItem('qr_used_set')||'[]'));
  set.add(id);
  localStorage.setItem('qr_used_set',JSON.stringify([...set]));
}

// 1. CLIC UTILISATEUR
btn.onclick=()=>{ 
  trackScan('qr4');
  addUsed('qr4');
  btn.style.display='none';
  
  // On force la lecture simple sans fioriture
  intro.play();
};

// 2. FIN DE LA QUESTION NARRATIVE
intro.onended=()=>{
  // On force l'affichage de l'image de toute façon
  qcm.style.display='block';
  placerZones();
  
  // On tente de lire la consigne. Si le nom du fichier est foiré sur GitHub, 
  // l'image et les zones restent fonctionnelles pour l'élève !
  try {
    consigne.play().catch(e => console.log("Audio bloqué ou introuvable, mais le jeu continue"));
  } catch(err) {
    console.log("Erreur ignorée pour éviter le freeze");
  }
};

function placerZones(){
  const r=qcm.getBoundingClientRect();
  const w=r.width,h=r.height,l=r.left,t=r.top;
  const pos=[[0,0,w/3,h/2],[w/3,0,w/3,h/2],[w*2/3,0,w/3,h/2],[0,h/2,w/3,h/2],[w/3,h/2,w/3,h/2],[w*2/3,h/2,w/3,h/2]];
  zones.forEach((z,i)=>{
    z.style.left=l+pos[i][0]+'px';
    z.style.top=t+pos[i][1]+'px';
    z.style.width=pos[i][2]+'px';
    z.style.height=pos[i][3]+'px';
    z.style.display='block';
    z.onclick=()=>validerChoix(i+1);
  });
}

function validerChoix(idx){
  try { consigne.pause(); } catch(e){}
  qcm.style.display='none';
  zones.forEach(z=>z.style.display='none');
  
  localStorage.setItem('qr4_ines_choice', String(idx));
  localStorage.setItem('qr4_ines', 'ines_5_choix.jpg');
  
  if (idx === 6) {
    messageFin.innerHTML = "Toi, tu l'as imaginée autrement.<br>C'est <strong>TON</strong> Inès à toi, garde-la bien en mémoire.";
  } else {
    messageFin.innerHTML = "Bien vu.<br>C'est <strong>TON</strong> Inès, garde-la bien en mémoire.";
  }
  
  messageFin.style.display='block';
  restart.style.display='block';
}

restart.onclick=()=>location.reload();

// Sécurité si redimensionnement ou rotation de tablette
window.onresize=()=>{ if(qcm.style.display==='block') placerZones(); };
</script>
</body>
</html>
