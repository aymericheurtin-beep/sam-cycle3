<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>QR4 - Inès</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden}
#start,#restart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5vmin;padding:4vmin 8vmin;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100}
#restart{display:none}
#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:4.6vmin;line-height:1.35;z-index:30;display:none;white-space:pre-line;text-shadow:0 0 6px #000}
#text.center{top:8%}
#text.bottom{bottom:6%;font-size:3.6vmin;background:rgba(0,0,0,.75);padding:1.6vmin 2.2vmin;border-radius:8px;max-width:85%}
#choices{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:1.6vmin;width:88%;max-height:45vh;overflow-y:auto;padding-bottom:2vmin;z-index:80;-webkit-overflow-scrolling:touch}
.btn{font-size:3.8vmin;padding:2.4vmin;background:rgba(17,17,17,.92);color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center;flex-shrink:0;backdrop-filter:blur(2px)}
.btn.sel{background:#fff;color:#000}
#image{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:90vmin;max-height:78vmin;z-index:10;display:none;cursor:pointer;transition:transform .3s ease, opacity 1.2s}
#hint{position:absolute;bottom:2%;left:50%;transform:translateX(-50%);font-size:3.2vmin;color:#fff;background:rgba(0,0,0,.6);padding:1vmin 2vmin;border-radius:6px;z-index:65;display:none;pointer-events:none}
</style>
</head>
<body>
<button id="start">Touchez pour commencer</button>
<button id="restart">Recommencer</button>
<div id="text"></div>
<div id="choices"></div>
<img id="image" alt="">
<div id="hint"></div>
<audio id="narrateur" src="narrateur_qr4.mp3" preload="auto" playsinline></audio>

<script>
/* unification typo block */
const unify = s => s.replace(/[’‘]/g,"'").replace(/[“”]/g,'"').replace(/\u00A0/g,' ').replace(/\s+/g,' ').trim();

const $ = id => document.getElementById(id);
const start = $('start');
const restart = $('restart');
const text = $('text');
const choices = $('choices');
const image = $('image');
const hint = $('hint');
const narrateur = $('narrateur');

const show = el => el.style.display = 'block';
const hide = el => el.style.display = 'none';
const flex = el => el.style.display = 'flex';
const sleep = ms => new Promise(r => setTimeout(r, ms));

function showTextStay(t, pos='center'){
  text.className = '';
  text.classList.add(pos);
  text.textContent = unify(t);
  show(text);
}

async function showText(t, dur=3000, pos='center'){
  showTextStay(t, pos);
  await sleep(dur);
  hide(text);
}

async function showImage(src){
  image.src = src;
  image.style.opacity = '0';
  show(image);
  requestAnimationFrame(()=> image.style.opacity = '1');
  await sleep(50);
}
async function hideImage(){
  image.style.opacity = '0';
  await sleep(1200);
  hide(image);
}

async function play(a){
  try{ a.currentTime = 0; await a.play(); }catch(e){}
}
function stopAudio(a){
  a.pause();
  a.currentTime = 0;
}

function askSingle(question, opts){
  return new Promise(resolve=>{
    showTextStay(question,'center');
    choices.innerHTML = '';
    flex(choices);
    opts.forEach(o=>{
      const b = document.createElement('button');
      b.className = 'btn';
      b.textContent = unify(o);
      b.onclick = ()=>{
        hide(choices);
        hide(text);
        resolve(o);
      };
      choices.appendChild(b);
    });
  });
}

function askMulti(question, opts, min=1){
  return new Promise(resolve=>{
    showTextStay(question,'center');
    choices.innerHTML = '';
    flex(choices);
    const selected = new Set();
    opts.forEach(o=>{
      const b = document.createElement('button');
      b.className = 'btn';
      b.textContent = unify(o);
      b.onclick = ()=>{
        if(selected.has(o)){ selected.delete(o); b.classList.remove('sel'); }
        else { selected.add(o); b.classList.add('sel'); }
        validate.style.display = selected.size >= min ? 'block' : 'none';
      };
      choices.appendChild(b);
    });
    const validate = document.createElement('button');
    validate.className = 'btn sel';
    validate.textContent = 'Valider';
    validate.style.display = 'none';
    validate.onclick = ()=>{
      hide(choices); hide(text);
      resolve([...selected]);
    };
    choices.appendChild(validate);
  });
}

async function run(){
  hide(start);
  hide(restart);
  await play(narrateur);
  await sleep(6000);
  stopAudio(narrateur);

  await showText("Inès. Vous devez choisir comment vous l'imaginez.",3000,'center');

  const choix = await askSingle("Quelle Inès choisissez-vous ?", [
    'Inès de face - regard direct',
    'Inès de profil - cheveux attachés',
    'Inès de dos - en mouvement'
  ]);

  const map = {
    'Inès de face - regard direct': 'ines_face.jpg',
    'Inès de profil - cheveux attachés': 'ines_profil.jpg',
    'Inès de dos - en mouvement': 'ines_dos.jpg'
  };
  const filename = map[choix] || '';
  localStorage.setItem('qr4_ines', filename);
  localStorage.setItem('qr4_ines_label', choix);

  await showImage(filename);
  await sleep(4000);
  await hideImage();

  await showText("Choix enregistré.\nVous la retrouverez plus tard.",3000,'center');

  show(restart);
}

start.onclick = run;
restart.onclick = ()=> location.reload();
</script>
</body>
</html>
</html>
