<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR4 - Inès</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui}
#btn{background:#fff;color:#000;border:none;padding:20px 40px;font-size:20px;border-radius:8px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:10}
#qcm{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:100vw;
  max-height:100vh;
  width:auto;
  height:auto;
  object-fit:contain;
  display:none;
}
#titre{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  font-weight:bold;
  text-align:center;
  display:none;
  z-index:5;
  background:rgba(0,0,0,0.7);
  padding:10px 20px;
  border-radius:8px;
}
.zone{
  position:fixed;
  cursor:pointer;
  border:3px solid transparent;
  transition:all 0.2s;
  display:none;
}
.zone:hover{border-color:#fff;background:rgba(255,255,255,0.15)}
#resultat{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:28px;
  background:rgba(0,0,0,0.95);
  padding:40px;
  border-radius:12px;
  text-align:center;
  display:none;
  z-index:20;
}
#restart{background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;margin-top:20px;cursor:pointer}
</style>
</head>
<body>
<button id="btn">Touchez pour commencer</button>
<div id="titre">Comment imaginez-vous Inès?</div>
<img id="qcm" src="./ines_5_choix.jpg" alt="QCM Inès">

<div class="zone" id="z1"></div>
<div class="zone" id="z2"></div>
<div class="zone" id="z3"></div>
<div class="zone" id="z4"></div>
<div class="zone" id="z5"></div>
<div class="zone" id="z6"></div>

<div id="resultat">
  <div id="texteResultat"></div>
  <button id="restart">Recommencer</button>
</div>

<audio id="intro" src="./ines_question.mp3" preload="auto"></audio>

<script>
const btn=document.getElementById('btn');
const qcm=document.getElementById('qcm');
const titre=document.getElementById('titre');
const intro=document.getElementById('intro');
const resultat=document.getElementById('resultat');
const texteResultat=document.getElementById('texteResultat');
const restart=document.getElementById('restart');
const zones=document.querySelectorAll('.zone');

const choix=[
  "Inès n°1","Inès n°2","Inès n°3",
  "Inès n°4","Inès n°5","Le Mystère"
];

btn.onclick=()=>{
  btn.style.display='none';
  intro.play().catch(e=>alert('Erreur audio : activez le son'));
}

intro.onended=()=>{
  qcm.style.display='block';
  titre.style.display='block';
  qcm.onload=placerZones;
  if(qcm.complete)placerZones();
}

function placerZones(){
  const rect=qcm.getBoundingClientRect();
  const w=rect.width;
  const h=rect.height;
  const left=rect.left;
  const top=rect.top;

  const zonesPos=[
    [0,0,w/3,h/2],[w/3,0,w/3,h/2],[w*2/3,0,w/3,h/2],
    [0,h/2,w/3,h/2],[w/3,h/2,w/3,h/2],[w*2/3,h/2,w/3,h/2]
  ];

  zones.forEach((z,i)=>{
    z.style.left=left+zonesPos[i][0]+'px';
    z.style.top=top+zonesPos[i][1]+'px';
    z.style.width=zonesPos[i][2]+'px';
    z.style.height=zonesPos[i][3]+'px';
    z.style.display='block';
    z.onclick=()=>validerChoix(i);
  });
}

function validerChoix(i){
  qcm.style.display='none';
  titre.style.display='none';
  zones.forEach(z=>z.style.display='none');
  texteResultat.textContent='Vous avez choisi : '+choix[i];
  resultat.style.display='block';
}

restart.onclick=()=>location.reload();
window.onresize=()=>{if(qcm.style.display=='block')placerZones();}
</script>
</body>
</html>
