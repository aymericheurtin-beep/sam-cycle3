<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR4 - Inès</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}

/* Boutons principaux harmonisés */
#btn, #restart {
  background:#fff;
  color:#000;
  border:none;
  padding:20px 40px;
  font-size:clamp(20px,5vmin,26px);
  border-radius:8px;
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  cursor:pointer;
  z-index:100
}
#btn{top:50%;transform:translate(-50%,-50%)}
#restart{bottom:40px;display:none}

/* Conteneur de la grille d'images */
#imgWrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:none;line-height:0}
#qcm{display:block;max-width:100vw;max-height:85vh;width:auto;height:auto;object-fit:contain}

/* Zones cliquables invisibles mais interactives */
.zone{position:absolute;cursor:pointer;border:3px solid transparent;transition:.2s}
.zone:hover,.zone.chosen{border-color:#fff;background:rgba(255,255,255,.2)}
.debug .zone{border-color:rgba(255,60,60,.8);border-style:dashed}

/* Écran final */
#messageFin{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,4.5vmin,28px);text-align:center;display:none;z-index:10;padding:20px;max-width:650px;line-height:1.45}
</style>
<style>
/* Forçage CUA des polices et tailles pour l'accessibilité */
html,body,button{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
p,#messageFin{font-size:clamp(20px,4.5vmin,28px)!important;line-height:1.45!important}
</style>
</head>
<body>

<button id="btn">Touchez pour commencer</button>
<button id="restart">Recommencer</button>

<div id="imgWrap">
  <img id="qcm" src="./ines_5_choix.jpg" alt="Choisis ton Inès">
</div>

<div id="messageFin"></div>

<audio id="question" src="./ines_question.mp3" preload="auto"></audio>
<audio id="consign" src="./ines_consign.mp3" preload="auto"></audio>

<script>
// --- Suivi et statistiques du dispositif ---
function trackScan(id) {
  try {
    let usedSet = new Set(JSON.parse(localStorage.getItem('qr_used_set') || '[]'));
    usedSet.add(id);
    let arr = Array.from(usedSet);
    localStorage.setItem('qr_used_set', JSON.stringify(arr));
    localStorage.setItem('scans_used', arr.length);
    localStorage.setItem('scans_total', '12');
  } catch(e) { console.error('Storage error:', e); }
}

// --- Configuration de la grille 3x2 ---
const zonesConfig = [
  { x: 0,     y: 0,  w: 33.33, h: 50 }, // Portrait 1
  { x: 33.33, y: 0,  w: 33.34, h: 50 }, // Portrait 2
  { x: 66.67, y: 0,  w: 33.33, h: 50 }, // Portrait 3
  { x: 0,     y: 50, w: 33.33, h: 50 }, // Portrait 4
  { x: 33.33, y: 50, w: 33.34, h: 50 }, // Portrait 5
  { x: 66.67, y: 50, w: 33.33, h: 50 }, // Le "?" (Choix 6)
];
const WILDCARD_INDEX = 6;

const btn = document.getElementById('btn');
const restart = document.getElementById('restart');
const imgWrap = document.getElementById('imgWrap');
const qcm = document.getElementById('qcm');
const question = document.getElementById('question');
const consign = document.getElementById('consign');
const messageFin = document.getElementById('messageFin');

if (new URLSearchParams(location.search).has('debug')) {
  imgWrap.classList.add('debug');
}

// --- Logique d'enchaînement sans blocage ---
btn.onclick = () => {
  trackScan('qr4');
  btn.style.display = 'none';
  
  // Lecture de la question initiale
  question.play().catch(() => {
    // Si le navigateur bloque, on transforme le bouton pour forcer l'interaction
    btn.textContent = 'Activer le son';
    btn.style.display = 'block';
  });
};

// Quand la question se termine -> On affiche l'image et on lance la consigne
question.onended = () => {
  btn.style.display = 'none';
  imgWrap.style.display = 'inline-block';
  
  const initialiserGrille = () => {
    creerZones();
    consign.play().catch(e => console.log("Attente interaction consigne", e));
  };

  if (qcm.complete) {
    initialiserGrille();
  } else {
    qcm.onload = initialiserGrille;
  }
};

// Génération dynamique des zones sur l'image
function creerZones() {
  imgWrap.querySelectorAll('.zone').forEach(z => z.remove());
  zonesConfig.forEach((z, i) => {
    const div = document.createElement('div');
    div.className = 'zone';
    div.style.left = z.x + '%';
    div.style.top = z.y + '%';
    div.style.width = z.w + '%';
    div.style.height = z.h + '%';
    div.onclick = () => validerChoix(i + 1, div);
    imgWrap.appendChild(div);
  });
}

// --- Validation et mémorisation du choix ---
function validerChoix(idx, zoneEl) {
  consign.pause();
  zoneEl.classList.add('chosen');
  
  // Sauvegarde cruciale pour les prochains QR Codes
  localStorage.setItem('qr4_ines_choice', String(idx));

  if (idx === WILDCARD_INDEX) {
    messageFin.innerHTML = "Toi, tu l'as imaginée autrement.<br>C'est <strong>TON</strong> Inès à toi, garde-la bien en mémoire.";
  } else {
    messageFin.innerHTML = "Bien vu.<br>C'est <strong>TON</strong> Inès, garde-la bien en mémoire.";
  }

  setTimeout(() => {
    imgWrap.style.display = 'none';
    messageFin.style.display = 'block';
    restart.style.display = 'block';
  }, 450);
}

restart.onclick = () => location.reload();

window.onresize = () => {
  if (imgWrap.style.display !== 'none' && imgWrap.querySelector('.zone')) {
    creerZones();
  }
};
</script>
</body>
</html>
