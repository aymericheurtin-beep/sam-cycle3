<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR4 - Inès</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui}
#btn{background:#fff;color:#000;border:none;padding:20px 40px;font-size:20px;border-radius:8px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:10}
#restart{background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;position:fixed;bottom:30px;left:50%;transform:translateX(-50%);cursor:pointer;display:none;z-index:10}
#qcm{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:100vw;
  max-height:100vh;
  width:auto;
  height:auto;
  object-fit:contain;
  display:none;
}
.zone{
  position:fixed;
  cursor:pointer;
  border:3px solid transparent;
  transition:all 0.2s;
  display:none;
}
.zone:hover{border-color:#fff;background:rgba(255,255,255,0.15)}
#messageFin{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:28px;
  text-align:center;
  display:none;
  z-index:10;
  padding:20px;
  max-width:80%;
  line-height:1.4;
  animation:fadeIn 0.6s ease-out;
}
@keyframes fadeIn{
  from{opacity:0;transform:translate(-50%,-40%)}
  to{opacity:1;transform:translate(-50%,-50%)}
}
</style>
<style>
/* === UNIFICATION TYPO === */
html,body,button,input,select,textarea {
  font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
p, #text, .screen p, #question, #msg {
  font-size:clamp(20px,4.5vmin,28px) !important;
  line-height:1.45 !important;
}
button, .btn, .choiceBtn, .choice, .carnetBtn {
  font-size:clamp(18px,4vmin,24px) !important;
  font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
#startBtn, #start, #btn, #restartBtn, #restart {
  font-size:clamp(20px,5vmin,26px) !important;
}
small, .sub, #recall, #hint, #carnetLine {
  font-size:clamp(16px,3.2vmin,20px) !important;
}
</style>
</head>
<body>
<button id="btn">Touchez pour commencer</button>
<button id="restart">Recommencer</button>
<img id="qcm" src="./ines_5_choix.jpg" alt="Choisissez votre Inès">
<div id="messageFin">Bien vu. C'est TON Inès, garde la bien en mémoire</div>

<div class="zone" id="z1"></div>
<div class="zone" id="z2"></div>
<div class="zone" id="z3"></div>
<div class="zone" id="z4"></div>
<div class="zone" id="z5"></div>
<div class="zone" id="z6"></div>

<audio id="intro" src="./ines_question.mp3" preload="auto"></audio>
<audio id="consigne" src="./ines_consigne.mp3" preload="auto"></audio>

<script>
const btn=document.getElementById('btn');
const restart=document.getElementById('restart');
const qcm=document.getElementById('qcm');
const intro=document.getElementById('intro');
const consigne=document.getElementById('consigne');
const zones=document.querySelectorAll('.zone');
const messageFin=document.getElementById('messageFin');

let t=parseInt(localStorage.getItem('scans_total')||0)+1;
localStorage.setItem('scans_total',t);

btn.onclick=()=>{
  let u=parseInt(localStorage.getItem('scans_used')||0)+1;
  localStorage.setItem('scans_used',u);

  btn.style.display='none';
  intro.play().catch(e=>alert('Activez le son'));
}

intro.onended=()=>{
  qcm.style.display='block';
  qcm.onload=()=>{
    placerZones();
    consigne.play();
  }
  if(qcm.complete){
    placerZones();
    consigne.play();
  }
}

function placerZones(){
  const rect=qcm.getBoundingClientRect();
  const w=rect.width;
  const h=rect.height;
  const left=rect.left;
  const top=rect.top;

  const zonesPos=[
    [0,0,w/3,h/2],[w/3,0,w/3,h/2],[w*2/3,0,w/3,h/2],
    [0,h/2,w/3,h/2],[w/3,h/2,w/3,h/2],[w*2/3,h/2,w/3,h/2]
  ];

  zones.forEach((z,i)=>{
    z.style.left=left+zonesPos[i][0]+'px';
    z.style.top=top+zonesPos[i][1]+'px';
    z.style.width=zonesPos[i][2]+'px';
    z.style.height=zonesPos[i][3]+'px';
    z.style.display='block';
    z.onclick=()=>validerChoix();
  });
}

function validerChoix(){
  consigne.pause();
  qcm.style.display='none';
  zones.forEach(z=>z.style.display='none');
  localStorage.setItem('qr4_ines','ines_5_choix.jpg');
  messageFin.style.display='block';
  restart.style.display='block';
}

restart.onclick=()=>location.reload();
window.onresize=()=>{if(qcm.style.display=='block')placerZones();}
</script>
</body>
</html>
