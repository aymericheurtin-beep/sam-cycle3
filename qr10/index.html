<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QR10</title>
    <style>
        html, body, div, span, img, button { 
            all: unset; 
            display: revert; 
            box-sizing: border-box;
        }
        body > div:not(#text):not(#start):not(#restart) { display: none !important; }
        
        html, body {
            background: #000 !important;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
        }
        .btn {
            font-size: 4vmin;
            padding: 3vmin 6vmin;
            background: #fff;
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: Arial, sans-serif;
            cursor: pointer;
            position: relative;
            z-index: 9999;
        }
        #start { animation: blink 1.5s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        #text {
            position: fixed;
            font-size: 4vmin;
            text-align: center;
            padding: 5vmin;
            line-height: 1.6;
            opacity: 0;
            transition: opacity 1s;
            white-space: pre-line;
            max-width: 90vw;
            z-index: 9998;
        }
        #image {
            position: fixed;
            width: 100vmin;
            height: 100vmin;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1.2s;
            z-index: 9997;
            background: #000;
        }
        #restart {
            position: fixed;
            bottom: 10vmin;
            opacity: 0;
            transition: opacity 1s;
        }
        .visible { opacity: 1 !important; }
        .hidden { display: none !important; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
        .vibrating { animation: shake 0.1s infinite; }
    </style>
</head>
<body>
    <button id="start" class="btn">Touchez pour entrer</button>
    <div id="text"></div>
    <img id="image" src="" onerror="this.style.display='none'">
    <button id="restart" class="btn">Recommencer</button>

    <audio id="audio1" src="couloirhopital2.mp3" preload="auto"></audio>
    <audio id="audio2" src="Remy.mp3" preload="auto"></audio>
    <audio id="audio3" src="vibreur.mp3" preload="auto"></audio>

    <script>
        const start = document.getElementById('start');
        const text = document.getElementById('text');
        const image = document.getElementById('image');
        const restart = document.getElementById('restart');
        const audio1 = document.getElementById('audio1');
        const audio2 = document.getElementById('audio2');
        const audio3 = document.getElementById('audio3');

        const sleep = ms => new Promise(r => setTimeout(r, ms));
        
        const playAndWait = (audio) => {
            return new Promise(resolve => {
                audio.onended = resolve;
                audio.play().catch(e => {
                    console.log('Erreur audio:', e);
                    resolve();
                });
            });
        };

        const showImage = (src) => {
            return new Promise((resolve) => {
                image.onload = () => {
                    image.style.display = 'block';
                    image.classList.add('visible');
                    resolve();
                };
                image.onerror = () => {
                    console.error('Image introuvable:', src);
                    resolve();
                };
                image.src = src;
            });
        };

        const clearScene = async () => {
            text.classList.remove('visible');
            image.classList.remove('visible', 'vibrating');
            await sleep(1200);
            image.src = '';
            text.textContent = '';
        };

        async function sequence() {
            start.classList.add('hidden');
            
            try {
                await playAndWait(audio1);
                await sleep(500);
                
                await showImage('portechambre.png');
                await sleep(4000);
                await clearScene();
                
                await playAndWait(audio2);
                await sleep(500);
                
                await showImage('winamax.png');
                image.classList.add('vibrating');
                await playAndWait(audio3);
                image.classList.remove('vibrating');
                await sleep(3000);
                await clearScene();
                
                text.textContent = 'Inès, elle, voit tout.\nLe téléphone de Rémy — écran allumé, pas verrouillé,\nun onglet ouvert sur un navigateur.\nElle lit en deux secondes :';
                text.classList.add('visible');
                await sleep(5000);
                text.classList.remove('visible');
                await sleep(1000);
                
                await showImage('ittversement.png');
                await sleep(5000);
                await clearScene();
                
                restart.classList.add('visible');
            } catch(e) {
                console.error('Erreur:', e);
                text.textContent = 'Erreur. Rechargez la page.';
                text.classList.add('visible');
                restart.classList.add('visible');
            }
        }

        start.onclick = () => sequence();
        restart.onclick = () => location.reload();
    </script>
</body>
</html>
