<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.screen.active{display:flex}
img,video{max-width:90%;max-height:70vh;object-fit:contain}
button{background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;cursor:pointer;margin-top:20px;z-index:10}
#startBtn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100}
</style>
</head>
<body>
<button id="startBtn">Touchez pour commencer</button>
<div id="s1" class="screen"></div>
