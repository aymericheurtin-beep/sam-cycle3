<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>QR12</title>
<style>
  :root{color-scheme:dark light}
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:#0b0d12;
    color:#e8ecf1;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .wrap{
    width:100%;
    max-width:720px;
    background:#121621;
    border:1px solid #1f2636;
    border-radius:16px;
    padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  h1{
    margin:0 0 16px;
    font-size:22px;
    font-weight:700;
    letter-spacing:.2px;
  }
  #text{
    font-size:18px;
    line-height:1.5;
    white-space:pre-wrap;
    min-height:3lh;
  }
  #choices{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:16px;
  }
  .choice{
    padding:12px 14px;
    border-radius:12px;
    border:1px solid #2a3448;
    background:#161c29;
    color:#e8ecf1;
    cursor:pointer;
    text-align:left;
    font-size:16px;
    transition:transform .05s ease,border-color .2s;
  }
  .choice:hover{border-color:#3a4763}
  .choice:active{transform:scale(.99)}
  .choice[aria-pressed="true"]{
    border-color:#5b8cff;
    background:#1a2440;
  }
  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .btn{
    padding:12px 16px;
    border-radius:12px;
    border:1px solid #2a3448;
    background:#1a2030;
    color:#e8ecf1;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
  }
  .btn.primary{
    background:#5b8cff;
    border-color:#5b8cff;
    color:#fff;
  }
  .btn:disabled{opacity:.6;cursor:not-allowed}
  #img{
    max-width:100%;
    height:auto;
    border-radius:12px;
    border:1px solid #1f2636;
    display:block;
    margin:0 auto;
  }
  .muted{color:#9aa7bd;font-size:14px}
  .stack{display:flex;flex-direction:column;gap:12px}
  .stats{
    background:#0f1320;
    border:1px dashed #2a3448;
    border-radius:12px;
    padding:14px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:14px;
    line-height:1.6;
  }
  .hidden{display:none !important}
</style>
</head>
<body>
<div class="wrap">
  <h1>QR12</h1>

  <div class="stack">
    <button id="start" class="btn primary">Démarrer</button>

    <div id="text" class="hidden"></div>

    <div id="choices" class="hidden"></div>

    <img id="img" class="hidden" alt="Suspects" />

    <button id="restart" class="btn hidden">Recommencer</button>

    <div id="stats" class="stats hidden"></div>
  </div>

  <audio id="narrateur" src="narrateur.mp3" preload="auto"></audio>
</div>

<script>
  const $ = s => document.querySelector(s);
  const startBtn = $('#start');
  const restartBtn = $('#restart');
  const textEl = $('#text');
  const choicesEl = $('#choices');
  const imgEl = $('#img');
  const statsEl = $('#stats');
  const narrateur = $('#narrateur');

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  const show = el => el.classList.remove('hidden');
  const hide = el => el.classList.add('hidden');
  const flex = el => {el.classList.remove('hidden'); el.style.display='flex'};

  function showText(html){
    textEl.innerHTML = html;
    show(textEl);
  }

  function clearChoices(){
    choicesEl.innerHTML = '';
    hide(choicesEl);
  }

  async function askSingle(question, options){
    showText(question);
    choicesEl.innerHTML = '';
    flex(choicesEl);
    return new Promise(resolve => {
      options.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'choice';
        b.textContent = opt;
        b.onclick = () => {
          clearChoices();
          resolve(opt);
        };
        choicesEl.appendChild(b);
      });
    });
  }

  async function askMulti(question, options){
    showText(question);
    choicesEl.innerHTML = '';
    flex(choicesEl);
    const selected = new Set();
    options.forEach(opt => {
      const b = document.createElement('button');
      b.className = 'choice';
      b.textContent = opt;
      b.setAttribute('aria-pressed','false');
      b.onclick = () => {
        if(selected.has(opt)){
          selected.delete(opt);
          b.setAttribute('aria-pressed','false');
        }else{
          selected.add(opt);
          b.setAttribute('aria-pressed','true');
        }
      };
      choicesEl.appendChild(b);
    });
    const row = document.createElement('div');
    row.className = 'row';
    const valider = document.createElement('button');
    valider.className = 'btn primary';
    valider.textContent = 'Valider';
    valider.onclick = () => {
      clearChoices();
      resolve(Array.from(selected));
    };
    row.appendChild(valider);
    choicesEl.appendChild(row);
    return new Promise(resolve => {
      valider._resolve = resolve;
    });
  }

  // Override askMulti resolve closure fix
  async function askMultiFixed(question, options){
    showText(question);
    choicesEl.innerHTML = '';
    flex(choicesEl);
    const selected = new Set();
    options.forEach(opt => {
      const b = document.createElement('button');
      b.className = 'choice';
      b.textContent = opt;
      b.setAttribute('aria-pressed','false');
      b.onclick = () => {
        if(selected.has(opt)){
          selected.delete(opt);
          b.setAttribute('aria-pressed','false');
        }else{
          selected.add(opt);
          b.setAttribute('aria-pressed','true');
        }
      };
      choicesEl.appendChild(b);
    });
    return new Promise(resolve => {
      const row = document.createElement('div');
      row.className = 'row';
      const valider = document.createElement('button');
      valider.className = 'btn primary';
      valider.textContent = 'Valider';
      valider.onclick = () => {
        clearChoices();
        resolve(Array.from(selected));
      };
      row.appendChild(valider);
      choicesEl.appendChild(row);
    });
  }

  async function play(audio){
    try{
      audio.currentTime = 0;
      const p = audio.play();
      if(p && typeof p.catch === 'function') p.catch(()=>{});
    }catch{}
  }

  function waitAudioOrTimeout(audio, ms){
    return new Promise(resolve => {
      let done = false;
      const finish = () => {
        if(done) return;
        done = true;
        audio.removeEventListener('ended', onEnd);
        resolve();
      };
      const onEnd = () => finish();
      audio.addEventListener('ended', onEnd, {once:true});
      setTimeout(finish, ms);
    });
  }

  async function showImageTimeout(src, fallback, ms){
    return new Promise(resolve => {
      let settled = false;
      const done = () => {
        if(settled) return;
        settled = true;
        setTimeout(()=>{ hide(imgEl); resolve(); }, ms);
      };
      imgEl.onerror = () => {
        if(fallback && imgEl.src.endsWith(src)){
          imgEl.src = fallback;
        }else{
          done();
        }
      };
      imgEl.onload = () => {
        show(imgEl);
        done();
      };
      imgEl.src = src;
    });
  }

  function getScans(){
    const used = parseInt(localStorage.getItem('scans_used') || '0',10);
    const total = parseInt(localStorage.getItem('scans_total') || '12',10);
    const solo = used <= 1 ? 'oui' : 'non';
    return {used,total,solo};
  }

  function incScans(){
    const used = parseInt(localStorage.getItem('scans_used') || '0',10)+1;
    localStorage.setItem('scans_used', String(used));
    if(!localStorage.getItem('scans_total')) localStorage.setItem('scans_total','12');
  }

  const descriptions = {
    'Vidal':'Vidal : méthodique, observateur, parle peu mais note tout.',
    'Noé':'Noé : impulsif, créatif, prend des risques.',
    'Rémy':'Rémy : calme, logique, excellent en déduction.',
    'Chloé':'Chloé : empathique, repère les détails humains.',
    'Colin':'Colin : technique, à l’aise avec les appareils.',
    'Sam':'Sam : rapide, efficace, va droit au but.',
    'Inès':'Inès : prudente, mémoire visuelle impressionnante.'
  };

  startBtn.onclick = async () => {
    hide(startBtn);
    hide(restartBtn);
    hide(statsEl);
    hide(imgEl);
    clearChoices();
    incScans();

    await play(narrateur);
    await waitAudioOrTimeout(narrateur, 6000);

    hide(textEl);
    await showImageTimeout('touslessuspects.jpg','touslessuspects.png',5000);

    const pieceOptions = ['Petite','Grande','Lumineuse','Sombre','Ordonnée','En bazar'];
    const pieces = await askMultiFixed('Comment décririez-vous la pièce ?', pieceOptions);
    localStorage.setItem('qr12_piece', JSON.stringify(pieces));

    const bureau = localStorage.getItem('qr11_bureau') || 'inconnu';
    const pieceTxt = pieces.length ? pieces.join(', ') : 'sans précision';
    showText(`Pont : Votre bureau précédent était <b>${bureau}</b>.<br>La pièce actuelle semble <b>${pieceTxt}</b>.`);

    await sleep(2000);

    const characters = ['Vidal','Noé','Rémy','Chloé','Colin','Sam','Inès'];
    const choisi = await askSingle('Qui choisissez-vous ?', characters);

    let desc = descriptions[choisi] || `${choisi} : profil non renseigné.`;
    const extras = [];

    const firstCarnet = localStorage.getItem('qr11_first_carnet');
    if(firstCarnet && firstCarnet === choisi){
      extras.push('→ Correspondance avec le premier carnet de QR11.');
    }
    if(localStorage.getItem('qr9_vestiaire') && localStorage.getItem('qr8_first')){
      extras.push('→ Indices vestiaire QR9 et premier élément QR8 confirmés.');
    }

    showText(`<b>${choisi}</b><br>${desc}${extras.length ? '<br><br>' + extras.join('<br>') : ''}`);

    await sleep(7000);

    showText('Instruction finale : conservez votre choix et avancez vers le point suivant sans partager d’informations. Restez attentif aux détails.');

    await sleep(7000);

    const {used,total,solo} = getScans();
    statsEl.innerHTML = `scans_total: ${total}<br>scans_used: ${used}<br>solo: ${solo}`;
    show(statsEl);
    show(restartBtn);
  };

  restartBtn.onclick = () => {
    hide(restartBtn);
    hide(statsEl);
    hide(imgEl);
    clearChoices();
    textEl.innerHTML = '';
    hide(textEl);
    show(startBtn);
  };

  // init
  hide(textEl);
  hide(choicesEl);
  hide(imgEl);
  hide(restartBtn);
  hide(statsEl);
</script>
</body>
</html>
