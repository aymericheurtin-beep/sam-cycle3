<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR12 - Chapitre 16</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;overflow:hidden}
#start,#restart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5vmin;padding:4vmin 8vmin;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100}
#restart{display:none}
#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:5vmin;line-height:1.35;z-index:30;display:none;white-space:pre-line;text-shadow:0 0 6px #000}
#text.center{top:8%}
#text.top{top:8%}
#text.bottom{bottom:6%;font-size:3.8vmin;background:rgba(0,0,0,.75);padding:1.8vmin 2.5vmin;border-radius:8px;max-width:85%}
#choices{position:absolute;top:28%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:2.2vmin;width:88%;z-index:30}
.btn{font-size:4vmin;padding:3vmin;background:#111;color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center}
.btn.validate{background:#fff;color:#000;margin-top:2vmin}
.choice{display:flex;align-items:center;gap:2vmin;background:#111;border:1px solid #fff;border-radius:8px;padding:2.5vmin;font-size:4vmin;cursor:pointer}
.choice input{width:4vmin;height:4vmin}
#image,#video{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:90vmin;max-height:78vmin;z-index:10;display:none}
#stats{position:absolute;bottom:5vmin;left:50%;transform:translateX(-50%);font-size:4vmin;font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;z-index:30;display:none;text-shadow:0 0 8px #000;text-align:center;line-height:1.4}
</style>
<style>
/* === UNIFICATION TYPO === */
html,body,button,input,select,textarea {
  font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
p, #text,.screen p, #question, #msg {
  font-size:clamp(20px,4.5vmin,28px)!important;
  line-height:1.45!important;
}
button,.btn,.choiceBtn,.choice,.carnetBtn {
  font-size:clamp(18px,4vmin,24px)!important;
  font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
#startBtn, #start, #btn, #restartBtn, #restart {
  font-size:clamp(20px,5vmin,26px)!important;
}
small,.sub, #recall, #hint, #stats {
  font-size:clamp(16px,3.2vmin,20px)!important;
}
</style>
</head>
<body>
<button id="start">Touchez pour entrer</button>
<button id="restart">Recommencer</button>

<div id="text"></div>
<div id="choices"></div>
<img id="image" alt="">
<video id="video" playsinline muted></video>
<div id="stats"></div>

<audio id="narrateur" src="narrateur.mp3" preload="auto"></audio>

<script>
const $ = id => document.getElementById(id);
const start = $('start'), restart = $('restart'), text = $('text'), choices = $('choices'), image = $('image'), video = $('video'), stats = $('stats');
const narrateur = $('narrateur');

const show = el => el.style.display = 'block';
const hide = el => el.style.display = 'none';
const flex = el => el.style.display = 'flex';
const sleep = ms => new Promise(r => setTimeout(r, ms));

function showText(t, hold=3000, pos='center'){
  text.className = ''; text.classList.add(pos);
  text.textContent = t; show(text);
  return sleep(hold).then(()=>hide(text));
}

function askSingle(q, opts){
  return new Promise(async res=>{
    text.className='center'; text.textContent=q; show(text);
    await sleep(500);
    choices.innerHTML='';
    opts.forEach(o=>{
      const b=document.createElement('button'); b.className='btn'; b.textContent=o;
      b.onclick=()=>{ hide(text); hide(choices); res(o); };
      choices.appendChild(b);
    });
    flex(choices);
  });
}

function askMulti(q, opts){
  return new Promise(async res=>{
    text.className='center'; text.textContent=q; show(text);
    await sleep(500);
    choices.innerHTML='';
    opts.forEach(o=>{
      const lab=document.createElement('label'); lab.className='choice';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.value=o;
      lab.appendChild(cb); lab.append(o); choices.appendChild(lab);
    });
    const v=document.createElement('button'); v.className='btn validate'; v.textContent='Valider';
    v.onclick=()=>{ const sel=[...choices.querySelectorAll('input:checked')].map(i=>i.value); hide(text); hide(choices); res(sel); };
    choices.appendChild(v);
    flex(choices);
  });
}

async function play(a){ try{ await a.play(); }catch(e){ console.warn('audio bloqué',e); } }

function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}

const charDesc={
  'Vidal':'Bras croisés. La montre neuve. Il attend que ça finisse.',
  'Noé':'Regard sur ses chaussures. La posture des mauvais jours.',
  'Rémy':'Bras bandé de l’épaule aux doigts. Il aurait préféré rester à l’hôpital.',
  'Chloé':'Elle arrive en dernier. Sa démarche quand elle est stressée.',
  'Colin':'Mains dans les poches. Il regarde personne en particulier.',
  'Sam':'Assis au centre. Il regarde Inès.',
  'Inès':'Debout. Elle a demandé à être debout.'
};

async function run(){
  if(localStorage.getItem('qr12_done')){
    await showText('Vous avez déjà parcouru ce QR.',3000,'center');
    show(restart);
    return;
  }
  hide(start); hide(restart);

  let used = parseInt(localStorage.getItem('scans_used')||'0')+1;
  localStorage.setItem('scans_used', used);
  localStorage.setItem('qr12_done','1');

  // 1. Narrateur
  narrateur.load();
  await play(narrateur);
  await new Promise(r=>{narrateur.onended=r; setTimeout(r,6000);});
  narrateur.pause(); narrateur.currentTime=0;
  await sleep(3000);

  // 2. Question pièce
  const repPiece = await askMulti('Avant d’entrer — vous imaginez cette pièce comment?', ['Petite','Grande','Lumineuse','Sombre','Ordonnée','En bazar']);

  // Pont QR11
  let qr11b=[];
  try{qr11b=JSON.parse(localStorage.getItem('qr11_bureau')||'[]');}catch{}
  const map={petite:'petit',grande:'grand',lumineuse:'lumineux',sombre:'sombre','ordonnée':'ordonné','en bazar':'en bazar'};
  const repNorm=repPiece.map(r=>map[normalize(r)]||normalize(r));
  const qr11Norm=qr11b.map(normalize);
  const overlap=repNorm.some(r=>qr11Norm.includes(r));
  await showText(overlap?'Tiens, comme le bureau de M. Vidal.':'Tiens, différemment du bureau de M. Vidal.',2500,'center');

  // 3. Tous les suspects 5s
  const imgList=['touslessuspects.jpg','touslessuspects.JPG','touslessuspects.png','touslessuspects.PNG'];
  let imgIdx=0;
  function tryLoadImg(){
    if(imgIdx>=imgList.length){console.warn('Image introuvable');return;}
    image.onerror=()=>{imgIdx++;tryLoadImg();};
    image.src=imgList[imgIdx];
  }
  tryLoadImg();
  show(image);
  await sleep(5000);
  hide(image);

  // 4. Choix personnage
  const charChoice = await askSingle('Touchez le personnage qui vous intéresse le plus.', Object.keys(charDesc));

  let txt = charDesc[charChoice];
  const firstCarnet = localStorage.getItem('qr11_first_carnet');
  if(firstCarnet && normalize(firstCarnet)===normalize(charChoice)){
    txt += "\n\nCe personnage doit vous intriguer, vous l’aviez choisi en premier dans le carnet de M. Vidal.";
  }
  const qr9 = localStorage.getItem('qr9_vestiaire');
  if(qr9){txt += `\n\nAu vestiaire, vous comptiez ${qr9}. Sam a arrêté de compter aujourd’hui.`;}
  const qr8 = localStorage.getItem('qr8_first');
  if(qr8){txt += `\n\nDans le bureau d’Arnaud, vous aviez regardé ${qr8} en premier. Inès, elle, avait regardé les chaussures.`;}

  await showText(txt,6000,'center');

  // 5. Instruction lecture
  await showText('Dans quelques secondes vous allez lire la suite du roman. Chaque personnage dans cette pièce a une raison d’être là. Vous aussi vous savez des choses sur eux. Utilisez-les.',7000,'center');

  // 6. Stats
  const total=parseInt(localStorage.getItem('scans_total')||'12');
  const usedNow=parseInt(localStorage.getItem('scans_used')||'0');
  const solo=Math.max(0,total-usedNow);
  stats.innerHTML=`Scans proposés : ${total}<br>Scans utilisés : ${usedNow}<br>Imagination seule : ${solo}`;
  show(stats);

  show(restart);
}

start.onclick = run;
restart.onclick = ()=> location.reload();
</script>
</body>
</html>
