<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR0 - Mode d'emploi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui;display:flex;align-items:center;justify-content:center;text-align:center}
#btn{background:#fff;color:#000;border:none;padding:20px 40px;font-size:20px;border-radius:8px;cursor:pointer}
#rule{display:none;font-size:22px;line-height:1.4;padding:40px;max-width:600px}
</style>
</head>
<body>
<button id="btn">Touchez pour commencer</button>
<div id="rule">Règle : ferme les yeux 5 secondes avant chaque scan. Imagine d'abord. Scan ensuite si besoin.<br><br><button id="btn2" style="margin-top:30px;background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;cursor:pointer">Continuer lecture</button></div>

<audio id="intro" src="./intro.mp3" preload="auto"></audio>

<script>
const btn=document.getElementById('btn');
const rule=document.getElementById('rule');
const intro=document.getElementById('intro');
const btn2=document.getElementById('btn2');

btn.onclick=()=>{
  btn.style.display='none';
  intro.play().catch(()=>alert('Activez le son'));
}

intro.onended=()=>{
  rule.style.display='block';
}

btn2.onclick=()=>window.close();
</script>
</body>
</html>
