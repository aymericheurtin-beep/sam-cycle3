<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR11 test start</title>
<style>
body{background:#000;color:#fff;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
#start{font-size:24px;padding:20px 40px;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer}
#log{position:absolute;top:20px;left:20px;right:20px;color:#0f0;font-family:monospace;white-space:pre-wrap}
</style>
</head>
<body>
<button id="start" type="button" onclick="startRun()">Touchez pour commencer</button>
<div id="log"></div>
<script>
function log(m){ document.getElementById('log').textContent += m + '\n'; }
function startRun(){
  log('click détecté');
  const btn=document.getElementById('start');
  btn.style.display='none';
  log('bouton caché, suite...');
  setTimeout(()=>{ log('run OK'); },500);
}
log('script chargé');
</script>
</body>
</html>
