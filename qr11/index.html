<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>QR12 - Chapitre 16</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;overflow:hidden}
#start,#restart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5vmin;padding:4vmin 8vmin;background:#fff;color:#000;border:none;border-radius:10px;cursor:pointer;z-index:100}
#restart{display:none}
#text{position:absolute;left:50%;transform:translateX(-50%);width:92%;text-align:center;font-size:4.6vmin;line-height:1.35;z-index:30;display:none;white-space:pre-line;text-shadow:0 0 6px #000}
#text.center{top:8%}
#text.top{top:8%}
#text.bottom{bottom:6%;font-size:3.6vmin;background:rgba(0,0,0,.75);padding:1.6vmin 2.2vmin;border-radius:8px;max-width:85%}
#choices{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);display:none;flex-direction:column;gap:1.6vmin;width:88%;max-height:45vh;overflow-y:auto;padding-bottom:2vmin;z-index:80;-webkit-overflow-scrolling:touch}
.btn{font-size:3.8vmin;padding:2.4vmin;background:rgba(17,17,17,.92);color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer;text-align:center;flex-shrink:0;backdrop-filter:blur(2px)}
.btn.sel{background:#fff;color:#000}
#image{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:90vmin;max-height:78vmin;z-index:10;display:none;cursor:pointer;transition:transform .3s ease, opacity 1.2s}
#charBar{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);width:92%;display:none;flex-wrap:wrap;gap:1.2vmin;justify-content:center;z-index:70;max-height:30vh;overflow-y:auto}
.charBtn{font-size:3.4vmin;padding:1.8vmin;background:rgba(0,0,0,.85);border:1px solid #fff;color:#fff;border-radius:6px;cursor:pointer;text-align:center;flex-shrink:0}
#stats{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);width:90%;background:rgba(0,0,0,.9);padding:2.2vmin;border-radius:8px;font-size:3.8vmin;line-height:1.4;text-align:center;display:none;z-index:75}
#hint{position:absolute;bottom:2%;left:50%;transform:translateX(-50%);font-size:3.2vmin;color:#fff;background:rgba(0,0,0,.6);padding:1vmin 2vmin;border-radius:6px;z-index:65;display:none;pointer-events:none}
</style>
<style>
/* === UNIFICATION TYPO === */
html,body,button,input,select,textarea {
  font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
p, #text, .screen p, #question, #msg {
  font-size:clamp(20px,4.5vmin,28px) !important;
  line-height:1.45 !important;
}
button, .btn, .choiceBtn, .choice, .charBtn {
  font-size:clamp(18px,4vmin,24px) !important;
  font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}
#startBtn, #start, #btn, #restartBtn, #restart {
  font-size:clamp(20px,5vmin,26px) !important;
}
small, .sub, #recall, #hint, #stats {
  font-size:clamp(16px,3.2vmin,20px) !important;
}
</style>
</head>
<body>
<button id="start">Touchez pour entrer</button>
<button id="restart">Recommencer</button>

<div id="text"></div>
<div id="choices"></div>
<img id="image" alt="">
<div id="charBar"></div>
<div id="stats"></div>
<div id="hint"></div>

<audio id="narrateur" src="narrateur.mp3" preload="auto" playsinline></audio>

<script>
const $ = id => document.getElementById(id);
const start = $('start'), restart = $('restart'), text = $('text'), choices = $('choices'), image = $('image'), charBar = $('charBar'), stats = $('stats'), hint=$('hint');
const narrateur = $('narrateur');

const show = el => el.style.display = 'block';
const hide = el => el.style.display = 'none';
const flex = el => el.style.display = 'flex';
const sleep = ms => new Promise(r => setTimeout(r, ms));

function showText(t, hold=3000, pos='center'){
  text.className=''; text.classList.add(pos);
  text.textContent=t; show(text);
  return sleep(hold).then(()=>hide(text));
}
function showTextStay(t,pos='center'){
  text.className=''; text.classList.add(pos);
  text.textContent=t; show(text);
}
function showImage(src){
  return new Promise(res=>{
    image.onload=()=>{show(image); image.style.opacity='1'; res();};
    image.onerror=()=>{console.warn('Image manquante:',src); show(image); res();};
    image.style.opacity='0';
    setTimeout(()=>{image.src=src;},50);
  });
}
function hideImage(){
  return new Promise(async res=>{
    image.style.opacity='0';
    await sleep(1200);
    hide(image);hide(hint);image.src='';
    res();
  });
}
async function play(a){try{await a.play();}catch{}}
function stopAudio(a){try{a.pause();a.currentTime=0;}catch{}}

function askMulti(q,opts){
  return new Promise(res=>{
    showTextStay(q,'center');
    choices.innerHTML='';
    const sel=new Set();
    opts.forEach(o=>{
      const b=document.createElement('button');b.className='btn';b.textContent=o;
      b.onclick=()=>{b.classList.toggle('sel'); sel.has(o)?sel.delete(o):sel.add(o); };
      choices.appendChild(b);
    });
    const ok=document.createElement('button');ok.className='btn';ok.textContent='Valider';ok.style.marginTop='1vmin';ok.style.background='#fff';ok.style.color='#000';
    ok.onclick=()=>{hide(text);hide(choices);res([...sel]);};
    choices.appendChild(ok);
    flex(choices);
    choices.scrollTop=0;
  });
}
function askSingle(q,opts){
  return new Promise(res=>{
    showTextStay(q,'center');
    choices.innerHTML='';
    opts.forEach(o=>{
      const b=document.createElement('button');b.className='btn';b.textContent=o;
      b.onclick=()=>{hide(text);hide(choices);res(o);};
      choices.appendChild(b);
    });
    flex(choices);
    choices.scrollTop=0;
  });
}

function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}

const charDesc={
  'Vidal':'Bras croisés. La montre neuve. Il attend que ça finisse.',
  'Noé':'Regard sur ses chaussures. La posture des mauvais jours.',
  'Rémy':'Bras bandé de l’épaule aux doigts. Il aurait préféré rester à l’hôpital.',
  'Chloé':'Elle arrive en dernier. Sa démarche quand elle est stressée.',
  'Colin':'Mains dans les poches. Il regarde personne en particulier.',
  'Sam':'Assis au centre. Il regarde Inès.',
  'Inès':'Debout. Elle a demandé à être debout.'
};

async function run(){
  if(localStorage.getItem('qr12_done')){
    await showText('Vous avez déjà parcouru ce QR.',3000,'center');
    show(restart);
    return;
  }
  hide(start);hide(restart);

  // 1. Narrateur
  await play(narrateur);
  await new Promise(r=>{narrateur.onended=r; setTimeout(r,6000);});
  stopAudio(narrateur);
  await sleep(3000);

  // 2. Question pièce
  const optsPiece=['Petite','Grande','Lumineuse','Sombre','Ordonnée','En bazar'];
  const repPiece=await askMulti('Avant d’entrer — vous imaginez cette pièce comment ?',optsPiece);
  
  // Pont QR11
  let qr11b=[];
  try{qr11b=JSON.parse(localStorage.getItem('qr11_bureau')||'[]');}catch{}
  const map={petite:'petit',grande:'grand',lumineuse:'lumineux',sombre:'sombre',ordonnée:'ordonné','en bazar':'en bazar'};
  const repNorm=repPiece.map(r=>map[normalize(r)]||normalize(r));
  const qr11Norm=qr11b.map(normalize);
  const overlap=repNorm.some(r=>qr11Norm.includes(r));
  await showText(overlap?'Tiens, comme le bureau de M. Vidal.':'Tiens, différemment du bureau de M. Vidal.',2500,'center');

  // 3. Tous les suspects 5s
  await showImage('touslessuspects.jpg');
  await sleep(5000);
  
  // Consigne + 7 personnages
  showTextStay('Touchez le personnage qui vous intéresse le plus.','top');
  charBar.innerHTML='';
  Object.keys(charDesc).forEach(name=>{
    const b=document.createElement('button');b.className='charBtn';b.textContent=name;
    b.onclick=()=>chooseChar(name);
    charBar.appendChild(b);
  });
  flex(charBar);
}

async function chooseChar(name){
  hide(charBar);hide(text);
  await hideImage();
  
  const firstCarnet=localStorage.getItem('qr11_first_carnet');
  let txt=charDesc[name];
  if(firstCarnet && normalize(firstCarnet)===normalize(name)){
    txt+="\n\nCe personnage doit vous intriguer, vous l’aviez choisi en premier dans le carnet de M. Vidal.";
  }
  // Refs QR9 / QR8
  const qr9=localStorage.getItem('qr9_vestiaire');
  if(qr9){txt+=`\n\nAu vestiaire, vous comptiez ${qr9}. Sam a arrêté de compter aujourd’hui.`;}
  const qr8=localStorage.getItem('qr8_first');
  if(qr8){txt+=`\n\nDans le bureau d’Arnaud, vous aviez regardé ${qr8} en premier. Inès, elle, avait regardé les chaussures.`;}
  
  await showText(txt,6000,'center');
  
  // 4. Instruction lecture
  await showText('Dans quelques secondes vous allez lire la suite du roman. Chaque personnage dans cette pièce a une raison d’être là. Vous aussi vous savez des choses sur eux. Utilisez-les.',7000,'center');
  
  // 5. Stats
  const total=parseInt(localStorage.getItem('scans_total')||'12');
  const used=parseInt(localStorage.getItem('scans_used')||'0');
  const solo=Math.max(0,total-used);
  stats.innerHTML=`Scans proposés : ${total}<br>Scans utilisés : ${used}<br>Imagination seule : ${solo}`;
  show(stats);
  
  localStorage.setItem('qr12_done','true');
  show(restart);
}

start.onclick = run;
restart.onclick = ()=> location.reload();
</script>
</body>
</html>
