<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QR2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;width:100%;height:100vh;overflow:hidden;font-family:system-ui}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.screen.active{display:flex}
#btn{background:#fff;color:#000;border:none;padding:20px 40px;font-size:20px;border-radius:8px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:100}
#restart{background:#fff;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;cursor:pointer;position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;display:none;opacity:0;transition:opacity 1s ease}
#restart.show{opacity:1;display:block}
p{font-size:22px;line-height:1.4;max-width:650px}
</style>
<style>
html,body,button,input,select,textarea{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
p,#text,.screen p,#question,#msg{font-size:clamp(20px,4.5vmin,28px)!important;line-height:1.45!important}
button,.btn,.choiceBtn,.choice,.carnetBtn{font-size:clamp(18px,4vmin,24px)!important;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
#startBtn,#start,#btn,#restartBtn,#restart{font-size:clamp(20px,5vmin,26px)!important}
small,.sub,#recall,#hint,#carnetLine{font-size:clamp(16px,3.2vmin,20px)!important}
</style>
</head>
<body>
<button id="btn">Touchez pour commencer</button>

<div id="post" class="screen">
  <p>Avec ce son, voyez-vous la scène autrement que lorsque vous l'aviez lue ?</p>
</div>
<button id="restart">Recommencer</button>

<audio id="audio" src="./qrcode2total.mp3" preload="auto"></audio>

<script>

function trackScan(id) {
  try {
    let usedSet = new Set(JSON.parse(localStorage.getItem('qr_used_set') || '[]'));
    usedSet.add(id);
    let arr = Array.from(usedSet);
    localStorage.setItem('qr_used_set', JSON.stringify(arr));
    localStorage.setItem('scans_used', arr.length);
    localStorage.setItem('scans_total', '12'); 
  } catch(e) { console.error('Storage error:', e); }
}

const btn=document.getElementById('btn');
const restart=document.getElementById('restart');
const audio=document.getElementById('audio');
const post=document.getElementById('post');




btn.onclick=()=>{ trackScan('qr2');
  
  
  try{const s=new Set(JSON.parse(localStorage.getItem('qr_used_set')||'[]'));s.add('qr2');localStorage.setItem('qr_used_set',JSON.stringify([...s]));}catch(e){}
  btn.style.display='none';
  audio.volume=1;
  audio.play().catch(()=>alert('Activez le son'));
}

audio.onended=()=>{
  post.classList.add('active');
  restart.style.display='block';
  setTimeout(()=>restart.classList.add('show'),50);
}

restart.onclick=()=>location.reload();
</script>
</body>
</html>
